interface:
  display_name: "GitHub PR Review"
  short_description: "Review GitHub.com pull requests for bugs and risk."
  default_prompt: "Use $gh-pr-review to review a GitHub.com pull request reachable through gh for bugs, regressions, risky assumptions, or missing tests; build a fresh local review draft by default, and when the user explicitly wants submission and GitHub write access exists, submit that exact saved draft after confirmation if the PR diff is unchanged."
